<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Token</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:monospace;padding:20px;font-size:13px;line-height:1.6}
h2{font-size:16px;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
.box{background:#111;border:1px solid #222;border-radius:8px;padding:14px;margin-bottom:12px;word-break:break-all}
.box b{color:#e8d44d;display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.ok{color:#3dda84}.err{color:#e84040}.dim{color:#555}
button{width:100%;padding:14px;margin-bottom:8px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:1px}
.b-w{background:#fff;color:#000}
.b-y{background:#e8d44d;color:#000}
.b-r{background:#1a0a0a;color:#e84040;border:1px solid #3a1a1a}
input{width:100%;padding:12px;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;font-size:14px;margin-bottom:8px;outline:none;letter-spacing:2px}
input:focus{border-color:#666}
</style>
</head>
<body>
<h2>Diagnóstico de Token</h2>

<div class="box" id="scanBox">
  <b>Token en la app actual</b>
  <span id="currentToken">Cargando...</span>
</div>

<div class="box" id="allKeysBox">
  <b>Todo lo guardado en esta app</b>
  <div id="allKeys">Cargando...</div>
</div>

<div class="box">
  <b>¿Cuál es el token de tu QR impreso?</b>
  <p style="color:#555;font-size:11px;margin-bottom:10px">Mira en la parte de abajo del QR impreso — aparece el token en pequeño. O escanea el QR con la cámara del móvil y copia el texto que aparece.</p>
  <input type="text" id="qrToken" placeholder="Ej: A3F9X2K1" oninput="this.value=this.value.toUpperCase()">
  <button class="b-y" onclick="fixToken()">Actualizar token de la app a este</button>
</div>

<button class="b-w" onclick="showAll()">Recargar datos</button>
<button class="b-r" onclick="clearAll()">Borrar TODO y empezar de cero</button>

<div class="box" id="log" style="margin-top:12px">
  <b>Log</b>
  <span id="logTxt" class="dim">—</span>
</div>

<script>
const KEYS = ['ma_v5','ma_v4','ma_v3','ma_v2','modo_accion_v2'];

function log(msg, ok=true){
  document.getElementById('logTxt').textContent = msg;
  document.getElementById('logTxt').className = ok ? 'ok' : 'err';
}

function showAll(){
  // Token actual
  let currentToken = '— no encontrado';
  let currentKey = null;
  for(const k of KEYS){
    try{
      const r = localStorage.getItem(k);
      if(r){
        const d = JSON.parse(r);
        if(d.token){ currentToken = d.token + ' (clave: '+k+')'; currentKey=k; break; }
      }
    }catch(e){}
  }
  document.getElementById('currentToken').innerHTML =
    currentKey
      ? `<span class="ok" style="font-size:22px;letter-spacing:4px">${currentToken.split(' ')[0]}</span><br><span class="dim">${currentToken.slice(currentToken.indexOf(' '))}</span>`
      : `<span class="err">${currentToken}</span>`;

  // Todas las claves
  let html = '';
  let found = false;
  for(const k of KEYS){
    const r = localStorage.getItem(k);
    if(r){
      found = true;
      try{
        const d = JSON.parse(r);
        html += `<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #222">
          <span class="ok">${k}</span><br>
          token: <b style="color:#e8d44d">${d.token||'—'}</b><br>
          puntos: ${d.points||0} · 
          hábitos hoy: ${Object.keys(d.done||{}).length} · 
          días: ${Object.keys(d.history||{}).length}
        </div>`;
      }catch(e){ html += `<div class="err">${k}: error al leer</div>`; }
    }
  }
  if(!found) html = '<span class="dim">No hay datos guardados — app nueva</span>';
  document.getElementById('allKeys').innerHTML = html;
}

function fixToken(){
  const newToken = document.getElementById('qrToken').value.trim().toUpperCase();
  if(newToken.length < 4){ log('Token demasiado corto', false); return; }

  // Buscar el estado actual y actualizarlo
  let saved = false;
  for(const k of KEYS){
    try{
      const r = localStorage.getItem(k);
      if(r){
        const d = JSON.parse(r);
        const oldToken = d.token;
        d.token = newToken;
        localStorage.setItem('ma_v5', JSON.stringify(d)); // guardar en v5
        localStorage.setItem(k, JSON.stringify(d)); // también en el original
        log(`Token actualizado: ${oldToken} → ${newToken}`);
        saved = true;
        showAll();
        return;
      }
    }catch(e){}
  }

  // Si no hay datos aún, crear estado nuevo con ese token
  if(!saved){
    const d = {points:0,token:newToken,today:'',done:{},history:{},streaks:{},wa:'',notif:false,notifDays:[false,true,true,true,true,true,false]};
    localStorage.setItem('ma_v5', JSON.stringify(d));
    log('Estado nuevo creado con token: '+newToken);
    showAll();
  }
}

function clearAll(){
  if(!confirm('¿Borrar TODO? Perderás puntos y racha.')) return;
  KEYS.forEach(k=>localStorage.removeItem(k));
  log('Datos borrados. Recarga la app principal.');
  showAll();
}

showAll();
</script>
</body>
</html>
